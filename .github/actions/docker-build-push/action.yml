---
description: "Docker Login, Build & Push"
name: "docker-login-build-push"
inputs:
  REGISTRY:
    description: "Container Image Registry Address"
    required: true
  IMAGE_NAME:
    description: "Conatiner Image Name"
    required: true
  ARTIFACT_NAME:
    description: "Name of the Application (ex: frontend, api, transcoder)"
    required: true
  CONTEXT_PATH:
    description: "Context path for the source code where the Dockerfile resides"
    required: true
  DOCKERFILE_NAME:
    description: "Docker filename with relative path"
    required: true
  BUILD_ARGS:
    description: "Docker build arguments (newline separated)"
    required: false
    default: ""
  PUSH_TO_REGISTRY:
    description: "Push to registry"
    required: true
    default: "false"
  GITHUB_TOKEN:
    description: "GitHub Token"
    required: true

runs:
  using: composite
  steps:
    - name: Docker Login
      uses: docker/login-action@v4.0.0
      with:
        registry: ${{ inputs.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6.0.0
      with:
        images: ${{ inputs.REGISTRY }}/${{ inputs.IMAGE_NAME }}/${{ inputs.ARTIFACT_NAME }}
        tags: |
          type=sha
          type=ref,event=branch
          type=raw,value=latest
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.0.0
      with:
        driver: docker-container

    - name: Build and push Docker images
      uses: docker/build-push-action@v7.0.0
      id: push
      with:
        context: ${{ inputs.CONTEXT_PATH }}
        file: ${{ inputs.CONTEXT_PATH }}/${{ inputs.DOCKERFILE_NAME }}
        push: ${{ inputs.PUSH_TO_REGISTRY }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        build-args: ${{ inputs.BUILD_ARGS }}

    - name: Generate artifact attestation
      if: steps.push.outputs.digest != ''
      uses: actions/attest-build-provenance@v4.1.0
      with:
        subject-name: ${{ inputs.REGISTRY }}/${{ inputs.IMAGE_NAME}}/${{ inputs.ARTIFACT_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
