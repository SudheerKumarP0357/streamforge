---
name: Backend API CI

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "backend/api/**"
  pull_request:
    branches:
      - "main"
    paths:
      - "backend/api/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/api
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24.0"
          cache-dependency-path: backend/api/go.sum

      - name: Build API
        run: go build -mod=readonly -v ./...

      - name: Go Vet
        run: go vet ./...

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-api
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/docker-build-push
        name: Docker Build & Push
        with:
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
          ARTIFACT_NAME: api
          CONTEXT_PATH: ./backend/api
          DOCKERFILE_NAME: Dockerfile
          PUSH_TO_REGISTRY: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
