name: Terraform - Azure
on:
  workflow_dispatch:
  push:
    branches:
      - infra/**
    paths:
      - infra/terraform/**
  pull_request:
    branches:
      - infra/**
    paths:
      - infra/terraform/**
env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_AZUREAD: true
  ARM_USE_OIDC: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.branch-check.outputs.env_name }}
    steps:
      - id: branch-check
        run: |
          # If it's a PR, use base_ref (the target). If not, use the current branch name.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_BRANCH="${{ github.base_ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi
          echo $TARGET_BRANCH
          if [[ "$TARGET_BRANCH" == "infra/production" ]]; then
            echo "Environment is production"
            echo "env_name=production" >> $GITHUB_OUTPUT
          elif [[ "$TARGET_BRANCH" == "infra/development" ]]; then
            echo "env_name=development" >> $GITHUB_OUTPUT
            echo "Environment is development"
          else
            # Default to development for safety to prevent accidental Prod changes
            echo "env_name=development" >> $GITHUB_OUTPUT
            echo "Environment is development"
          fi

  terraform-plan:
    # if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./infra/terraform

    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [set-env]
    environment: ${{ needs.set-env.outputs.env_name }}
    # environment: ${{ github.event_name == 'pull_request' && (github.head_ref == 'infra/development' && 'development' || github.head_ref == 'infra/production' && 'production') || (github.ref == 'refs/heads/infra/development' && 'development' || github.ref == 'refs/heads/infra/production' && 'production') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terrafom format
        id: fmt
        run: terraform fmt -check
        # continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
          -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ secrets.BACKEND_STORAGE_CONTAINER_NAME }}" \
          -backend-config="key=${{ secrets.BACKEND_STATE_KEY }}"
        # continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        # continue-on-error: true

      - name: Terraform Security Checks
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: ./infra/terraform

      - name: Terraform Plan
        id: plan
        # continue-on-error: true
        run: |
          terraform plan \
            -no-color \
            -var="postgres_administrator_password=${{secrets.POSTGRES_PASSWORD}}" \
            -var="cosmos_administrator_password=${{secrets.COSMOS_PASSWORD}}" \
            -var="jwt_secret=${{secrets.JWT_SECRET}}" \
            -var="rabbitmq_default_pass=${{secrets.RABBITMQ_PASSWORD}}" \
            -out=main.tfplan 2>&1 | tee plan_output.txt

      - name: Upload Terrafrom Plan
        uses: actions/upload-artifact@v4
        id: upload
        # continue-on-error: true
        with:
          name: streamforge-tfplan
          path: infra/terraform/main.tfplan

      - name: Update PR with Plan
        uses: actions/github-script@v8
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read plan output from file
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('infra/terraform/plan_output.txt', 'utf8');
            } catch (e) {
              planOutput = 'Could not read plan output';
            }

            // Trim to avoid GitHub comment size limits (65536 chars max)
            const maxLength = 60000;
            if (planOutput.length > maxLength) {
              planOutput = planOutput.substring(0, maxLength) + '\n... output truncated, download artifact for full plan';
            }

            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const output = [
              '#### Streamforge Terraform Plan Output ' + planStatus,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              '| Step | Result |',
              '|------|--------|',
              '| Format | `${{ steps.fmt.outcome }}` |',
              '| Init | `${{ steps.init.outcome }}` |',
              '| Validate | `${{ steps.validate.outcome }}` |',
              '| Plan | `${{ steps.plan.outcome }}` |',
              '|Upload|`${{ steps.upload.outcome }}`|',
              '|Artifact URL|`${{ steps.upload.outputs.artifact-url }}`|',
              '',
              '*Pushed by @${{ github.actor }}, Action: `${{ github.event_name }}`*',
            ].join('\n');

            // Find and delete previous bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Streamforge Terraform Plan Output')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
 
  terraform-apply:
    # Only apply on pushes to the infra branches (post-merge)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/infra/development' || github.ref == 'refs/heads/infra/production')
    needs: [set-env, terraform-plan]
    environment: ${{ needs.set-env.outputs.env_name }}
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ secrets.BACKEND_STORAGE_CONTAINER_NAME }}" \
          -backend-config="key=${{ secrets.BACKEND_STATE_KEY }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: streamforge-tfplan
          # We download it directly into the working directory
          path: ./infra/terraform

      - name: Terraform Apply
        id: apply
        # We specify the exact file downloaded from the artifact
        run: |
          terraform apply \
          -no-color \
          -var="postgres_administrator_password=${{secrets.POSTGRES_PASSWORD}}" \
          -var="cosmos_administrator_password=${{secrets.COSMOS_PASSWORD}}" \
          -var="jwt_secret=${{secrets.JWT_SECRET}}" \
          -var="rabbitmq_default_pass=${{secrets.RABBITMQ_PASSWORD}}" \
          -auto-approve main.tfplan