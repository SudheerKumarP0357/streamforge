  terraform-apply:
    name: Terraform Apply
    # needs: [manual-approval, terraform-plan]
    needs: [terraform-plan]
    if: success() && github.ref == 'refs/heads/main' && ( github.event_name == 'push' || github.event_name == 'workflow_dispatch' )

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/terraform

    outputs:
      resource_group_name: ${{ steps.terraform_outputs.outputs.resource_group_name }}
      aks_cluster_name: ${{ steps.terraform_outputs.outputs.aks_cluster_name }}
      alb_client_id: ${{ steps.terraform_outputs.outputs.alb_client_id }}
      alb_subnet_id: ${{ steps.terraform_outputs.outputs.alb_subnet_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ secrets.BACKEND_STORAGE_CONTAINER_NAME }}" \
          -backend-config="key=${{ secrets.BACKEND_STATE_KEY }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: streamforge-tfplan
          path: ./infra/terraform

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve main.tfplan

      - name: Terraform Outputs
        id: terraform_outputs
        run: |
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "storage_account_name=$(terraform output -raw storage_account_name)" >> $GITHUB_OUTPUT
          echo "key_vault_name=$(terraform output -raw key_vault_name)" >> $GITHUB_OUTPUT
          echo "redis_name=$(terraform output -raw redis_name)" >> $GITHUB_OUTPUT
          echo "postgres_server_name=$(terraform output -raw postgres_server_name)" >> $GITHUB_OUTPUT
          echo "mongo_cluser_name=$(terraform output -raw mongo_cluser_name)" >> $GITHUB_OUTPUT
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> $GITHUB_OUTPUT
          echo "alb_client_id=$(terraform output -raw azure_alb_identity)" >> $GITHUB_OUTPUT
          echo "alb_subnet_id=$(terraform output -raw alb_subnet_id)" >> $GITHUB_OUTPUT
          echo "Alb Subnet ID: $(terraform output -raw alb_subnet_id)"

      - name: Verify GITHUB_OUTPUT file
        run: |
          cat $GITHUB_OUTPUT
          grep "alb_subnet_id" $GITHUB_OUTPUT

