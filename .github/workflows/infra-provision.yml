name: Infra Provision - Azure
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - infra/terraform/**
  pull_request:
    branches:
      - main
    paths-ignore:
      - scripts/*
      - k8s/*

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_AZUREAD: true
  ARM_USE_OIDC: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    name: Terraform Plan
    if: github.ref == 'refs/heads/main' && ( github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' )
    defaults:
      run:
        working-directory: ./infra/terraform

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terrafom format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: |
          terraform init \
          -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ secrets.BACKEND_STORAGE_CONTAINER_NAME }}" \
          -backend-config="key=${{ secrets.BACKEND_STATE_KEY }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Run Checkov action
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          quiet: true
          soft_fail: true
          github_pat: ${{ secrets.GITHUB_TOKEN }}
          directory: infra/terraform

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -var="postgres_administrator_username=${{ vars.POSTGRES_USERNAME }}" \
            -var="postgres_administrator_password=${{ secrets.POSTGRES_PASSWORD }}" \
            -var="postgres_database_name=${{ vars.POSTGRES_DATABASE }}" \
            -var="cosmos_administrator_username=${{ vars.COSMOS_USERNAME }}" \
            -var="cosmos_administrator_password=${{ secrets.COSMOS_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="key_vault_admin_object_id=${{ vars.KV_ADMIN_OBJECT_ID }}" \
            -var="public_key_openssh=${{ secrets.PUBLIC_KEY_PERSONAL }}" \
            -out=main.tfplan 2>&1 | tee plan_output.txt

      - name: Upload Terrafrom Plan
        uses: actions/upload-artifact@v4
        id: upload
        with:
          name: streamforge-tfplan
          path: infra/terraform/main.tfplan
          retention-days: 1

      - name: Update PR with Plan
        uses: actions/github-script@v8
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read plan output from file
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('infra/terraform/plan_output.txt', 'utf8');
            } catch (e) {
              planOutput = 'Could not read plan output';
            }

            // Trim to avoid GitHub comment size limits (65536 chars max)
            const maxLength = 60000;
            if (planOutput.length > maxLength) {
              planOutput = planOutput.substring(0, maxLength) + '\n... output truncated, download artifact for full plan';
            }

            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const output = [
              '#### Streamforge Terraform Plan Output ' + planStatus,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              '| Step | Result |',
              '|------|--------|',
              '| Format | `${{ steps.fmt.outcome }}` |',
              '| Init | `${{ steps.init.outcome }}` |',
              '| Validate | `${{ steps.validate.outcome }}` |',
              '| Plan | `${{ steps.plan.outcome }}` |',
              '|Upload|`${{ steps.upload.outcome }}`|',
              '|Artifact URL|`${{ steps.upload.outputs.artifact-url }}`|',
              '',
              '*Pushed by @${{ github.actor }}, Action: `${{ github.event_name }}`*',
            ].join('\n');

            // Find and delete previous bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Streamforge Terraform Plan Output')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });

