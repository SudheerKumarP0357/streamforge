name: Backend Transcoder CI

on:
  push:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24.0"

      - name: Build
        run: go build -v ./cmd/server/main.go
        working-directory: ./backend/api

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-push
        with:
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
          ARTIFACT_NAME: transcoder
          CONTEXT_PATH: ./backend/transcoder
          DOCKERFILE_NAME: Dockerfile
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
