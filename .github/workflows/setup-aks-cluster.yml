name: Setup AKS Cluster

on:
  workflow_dispatch:
    inputs:
      aks_cluster_name:
        description: "AKS Cluster Name"
        required: true
        type: string
      resource_group_name:
        description: "Resource Group Name"
        required: true
        type: string
      alb_client_id:
        description: "Azure LoadBalancer UMAI Client id"
        required: true
        type: string
      alb_controller_namespace:
        description: "Azure alb-controller namespace"
        required: true
        type: string
        default: azure-alb-system
      alb_subnet_id:
        description: "Azure alb-controller subnet id"
        required: true
        type: string

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_AZUREAD: true
  ARM_USE_OIDC: true

permissions:
  id-token: write

jobs:
  setup-alb-controller:
    name: Install ALB Controller
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS Cluster Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ github.event.inputs.resource_group_name }} \
            --name ${{ github.event.inputs.aks_cluster_name }} \
            --overwrite-existing && \
          kubectl cluster-info

      - name: Install alb-controller using Helm
        run: |
          # Get the currently deployed chart version
          CURRENT_VERSION=$(helm list -n azure-alb-system --filter "^alb-controller$" -o json | jq -r '.[0].chart')

          if [[ "$CURRENT_VERSION" == "alb-controller-1.9.13" ]]; then  
            echo "Versions match. Skipping upgrade to prevent revision bloat."
          else
            echo "New version detected. Proceeding with upgrade..."
            helm upgrade --install alb-controller oci://mcr.microsoft.com/application-lb/charts/alb-controller \
            --namespace ${{ github.event.inputs.alb_controller_namespace }} \
            --create-namespace \
            --version 1.9.13 \
            --set albController.namespace=${{ github.event.inputs.alb_controller_namespace }} \
            --set albController.podIdentity.clientID=${{ github.event.inputs.alb_client_id }}
          fi

      - name: Wait for alb-controller Pods Ready
        run: kubectl wait pod --selector app=alb-controller -n ${{ github.event.inputs.alb_controller_namespace }} --for=condition=Ready --timeout=600s

      - name: Verify alb-controller is running
        run: kubectl get pods -n ${{ github.event.inputs.alb_controller_namespace }}

      - name: Wait for GatewayClass to be accepted
        run: kubectl wait gatewayclass azure-alb-external --for=condition=Accepted --timeout=600s

      - name: Verify GatewayClass azure-alb-external is installed
        run: kubectl get gatewayclass azure-alb-external -o yaml

      - name: Create ApplicationLoadBalancer Kubernetes Resource
        run: |
          kubectl apply -f - <<EOF
          apiVersion: alb.networking.azure.io/v1
          kind: ApplicationLoadBalancer
          metadata:
            name: alb-infra
            namespace: ${{ github.event.inputs.alb_controller_namespace }}
          spec:
            associations:
            - ${{ github.event.inputs.alb_subnet_id }}
          EOF

      - name: Wait for the ApplicationLoadBalancer Deployment
        run: kubectl wait --for='jsonpath={.status.conditions[?(@.type=="Deployment")].reason}=Ready' applicationloadbalancer/alb-infra -n ${{ github.event.inputs.alb_controller_namespace }} --timeout=600s

      - name: Verify ApplicationLoadBalancer is running
        run: kubectl get applicationloadbalancer alb-infra -n ${{ github.event.inputs.alb_controller_namespace }} -o yaml

  cert-manager:
    name: Setup Cert Manager
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS Cluster Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ github.event.inputs.resource_group_name }} \
            --name ${{ github.event.inputs.aks_cluster_name }} \
            --overwrite-existing && \
          kubectl cluster-info

      - name: Install cert-manager using Helm
        run: |
          # Get the currently deployed chart version
          CURRENT_VERSION=$(helm list -n cert-manager --filter "^cert-manager$" -o json | jq -r '.[0].chart')

          if [[ "$CURRENT_VERSION" == "cert-manager-v1.20.2" ]]; then  
            echo "Versions match. Skipping upgrade to prevent revision bloat."
          else
            echo "New version detected. Proceeding with upgrade..."
            helm upgrade --install \
              cert-manager oci://quay.io/jetstack/charts/cert-manager \
              --version v1.20.2 \
              --namespace cert-manager \
              --create-namespace \
              --set crds.enabled=true
          fi

      - name: Wait for the Cert Manager resources Ready
        run: kubectl wait pod --selector app.kubernetes.io/version=v1.20.2  --selector helm.sh/chart=cert-manager-v1.20.2 -n cert-manager --for=condition=Ready --timeout=600s

      - name: Verify Cert Manager pods
        run: kubectl get pods -n cert-manager
