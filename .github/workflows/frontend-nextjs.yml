---
name: Streamforge Frontend CI

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "frontend/**"
  pull_request:
    branches:
      - "main"
    # Intentionally no paths filter — required status check must
    # always run and report on every PR regardless of changed files

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.11.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - run: npm ci
        name: Install dependencies
      - run: npm run build
        name: Build the Frontend

  docker-build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-frontend

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
      IMAGE_NAME: ${{ github.repository }}
      ARTIFACT_NAME: frontend
      CONTEXT_PATH: ./frontend
      DOCKERFILE_NAME: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login Azure using ServicePrincipal
      - name: Login Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Login Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.ARTIFACT_NAME }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}/${{ env.ARTIFACT_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        id: push
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.CONTEXT_PATH }}/${{ env.DOCKERFILE_NAME }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Generate artifact attestation
        if: steps.push.outputs.digest != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.ARTIFACT_NAME }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}/${{ env.ARTIFACT_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

