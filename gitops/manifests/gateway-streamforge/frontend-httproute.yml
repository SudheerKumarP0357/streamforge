apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-https-httproute
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - name: streamforge-gateway
      sectionName: https-listener
      namespace: streamforge-prod
  hostnames:
    - "streamforge.sudheer.fun"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sf-frontend-svc
          port: 80
          namespace: streamforge-prod
