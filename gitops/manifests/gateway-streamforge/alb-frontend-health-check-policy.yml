apiVersion: alb.networking.azure.io/v1
kind: HealthCheckPolicy
metadata:
  name: frontend-health-check
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetRef:
    group: ""
    kind: Service
    name: sf-frontend-svc
    namespace: streamforge-prod
  default:
    interval: 10s
    timeout: 5s
    healthyThreshold: 2
    unhealthyThreshold: 3
    port: 3000 # Port number for Containers not the Service port number
    http:
      path: /api/health
      match:
        statusCodes:
          - start: 200
            end: 299
    useTLS: false
