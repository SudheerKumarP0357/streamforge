apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: streamforge-tls-cert
  labels:
    app.kubernetes.io/part-of: streamforge-infra
    app.kubernetes.io/component: cert-manager
spec:
  secretName: streamforge-tls-secret
  privateKey:
    algorithm: RSA
    size: 2048
  duration: 2160h
  renewBefore: 360h
  isCA: false
  usages:
    - server auth
    - digital signature
    - key encipherment
  commonName: placeholder
  dnsNames:
    - placeholder
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
