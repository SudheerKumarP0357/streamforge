apiVersion: v1
kind: ConfigMap
metadata:
  name: sf-configmaps
data:
  POSTGRES_PORT: "5432"
  POSTGRES_SSL_MODE: require
  REDIS_PORT: "10000"
  RABBITMQ_PORT: "5672"
  RABBITMQ_HOST: sf-rabbitmq-svc
  AZURE_BLOB_RAW_CONTAINER: raw-videos
