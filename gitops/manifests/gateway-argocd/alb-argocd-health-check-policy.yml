apiVersion: alb.networking.azure.io/v1
kind: HealthCheckPolicy
metadata:
  name: argocd-health-check
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetRef:
    group: ""
    kind: Service
    name: argocd-server
    namespace: argocd
  default:
    interval: 5s
    timeout: 3s
    healthyThreshold: 1
    unhealthyThreshold: 1
    port: 8080 # Port number for Containers not the Service port number
    http:
      path: /healthz?full=true
      match:
        statusCodes:
          - start: 200
            end: 299
    useTLS: true
