apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sf-gateway-streamforge
  namespace: argocd
  labels:
    name: gateway
    project: streamforge
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: streamforge
  source:
    repoURL: https://github.com/SudheerKumarP0357/streamforge.git
    targetRevision: HEAD
    path: gitops/manifests/gateway-streamforge

  # Destination cluster and namespace to deploy the application
  destination:
    server: https://kubernetes.default.svc
    namespace: streamforge-prod

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
    managedNamespaceMetadata:
      labels:
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/name: streamforge
  revisionHistoryLimit: 10
