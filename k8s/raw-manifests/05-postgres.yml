---
# --------- Deployment : Postgres ---------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: streamforge
  labels:
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: postgres
    app.kubernetes.io/tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: streamforge-application
      app.kubernetes.io/component: postgres
      app.kubernetes.io/tier: database
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/component: postgres
        app.kubernetes.io/tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          resources:
            limits:
              memory: "512Mi"
              cpu: "1"
            requests:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sf-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: POSTGRES_DB
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "streamforge", "-d", "streamforge"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "streamforge", "-d", "streamforge"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

---
# --------- Service : Postgres ---------
apiVersion: v1
kind: Service
metadata:
  name: sf-postgres-svc
  namespace: streamforge
  labels:
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: postgres
    app.kubernetes.io/tier: database
spec:
  selector:
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: postgres
    app.kubernetes.io/tier: database
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP

---
