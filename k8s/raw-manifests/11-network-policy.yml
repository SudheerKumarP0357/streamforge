# -------------- Network Policy : Postgres --------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-only-api-transcoder-to-postgres
  namespace: streamforge
  labels:
    app: streamforge
    app.kubernetes.io/name: streamforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: postgres
      app.kubernetes.io/tier: database
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: streamforge
              app.kubernetes.io/component: api
              app.kubernetes.io/tier: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: streamforge
              app.kubernetes.io/component: transcoder
              app.kubernetes.io/tier: backend
      ports:
        - protocol: TCP
          port: 5432

