---
# Patches hostnames for dev environment HTTP→HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
spec:
  parentRefs:
    - name: streamforge-gateway
      namespace: streamforge-dev
      sectionName: http-listener
  hostnames:
    - "sudheer.fun"
    - "*.sudheer.fun"
