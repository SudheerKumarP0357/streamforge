---
# HTTPRoute — redirect HTTP to HTTPS
# Namespaced, lives in same namespace as Gateway
# All actual app routes are defined in each app's own HTTPRoute
# (in the streamforge namespace, pointing to this Gateway)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: streamforge-httproute
  labels:
    app.kubernetes.io/part-of: streamforge-infra
    app.kubernetes.io/component: gateway
spec:
  parentRefs:
    - name: streamforge-gateway
      namespace: streamforge-dev
      sectionName: http-listener
  hostnames:
    - "sudheer.fun"
    - "*.sudheer.fun"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
