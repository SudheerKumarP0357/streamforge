---
# Certificate — namespaced, must live in same namespace as the Gateway
# cert-manager will create the TLS secret in this same namespace
# The secret name is referenced by the Gateway listener
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stremforge-tls-cert
  labels:
    app.kubernetes.io/part-of: streamforge-infra
    app.kubernetes.io/component: cert-manager
spec:
  secretName: stremforge-tls-secret
  privateKey:
    algorithm: RSA
    size: 2048

  duration: 2160h
  renewBefore: 360h

  isCA: false
  usages:
    - server auth
    - digital signature
    - key encipherment

  commonName: "*.sudheer.fun"
  dnsNames:
    - "sudheer.fun"
    - "*.sudheer.fun"
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
