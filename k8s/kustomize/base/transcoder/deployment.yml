---
# --------- Deployment : Transcoder ---------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sf-transcoder
  labels:
    app.kubernetes.io/name: transcoder
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: backend
    azure.workload.identity/use: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transcoder
      app.kubernetes.io/part-of: streamforge-application
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transcoder
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: "sf-workload-sa"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - transcoder
                topologyKey: "kubernetes.io/hostname"
      initContainers:
        # InitContainer for Postgres
        - name: wait-for-postgres
          image: busybox:1.36
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: POSTGRES_PORT
          command:
            - sh
            - -c
            - |
              until nc -z ${POSTGRES_HOST} ${POSTGRES_PORT}; do
                echo "Waiting for Postgres..."
                sleep 5
              done
              echo "Port is ready"

        # InitContainer for Redis
        - name: wait-for-redis
          image: busybox:1.36
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: REDIS_PORT
          command:
            - sh
            - -c
            - |
              until nc -z ${REDIS_HOST} ${REDIS_PORT}; do
                echo "Waiting for Redis..."
                sleep 5
              done
              echo "Redis is ready"

        # InitContainer for RabbitMq
        - name: wait-for-rabbitmq
          image: busybox:1.36
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: sf-configmaps
                  key: RABBITMQ_PORT
          command:
            - sh
            - -c
            - |
              until nc -z ${RABBITMQ_HOST} ${RABBITMQ_PORT}; do
                echo "Waiting for RabbitMq..."
                sleep 5
              done
              echo "RabbitMq is ready"

      containers:
        - name: transcoder
          image: ghcr.io/sudheerkumarp0357/streamforge/transcoder:latest
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"
            requests:
              memory: "1Gi"
              cpu: "1"
          ports:
            - containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sf-configmaps
            - secretRef:
                name: sf-secrets
          env:
            - name: RABBITMQ_QUEUE
              value: transcoder.jobs
            - name: RABBITMQ_DEAD_LETTER_QUEUE
              value: transcoder.jobs.dlq
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: sf-secrets
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: sf-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-kv-sf"
