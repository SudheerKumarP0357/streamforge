# --------- Deployment : Transcoder ---------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamforge-transcoder
  labels:
    app.kubernetes.io/name: transcoder
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: transcoder
      app.kubernetes.io/part-of: streamforge-application
      app.kubernetes.io/component: backend
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transcoder
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: transcoder
                topologyKey: kubernetes.io/hostname
      initContainers:
        # InitContainer for Postgres
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z streamforge-postgres-svc 5432; do
                echo "Waiting for Postgres..."
                sleep 3
              done
              echo "Port is ready"

        # InitContainer for Redis
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z streamforge-redis-svc 6379; do
                echo "Waiting for Redis..."
                sleep 3
              done
              echo "Redis is ready"

        # InitContainer for RabbitMq
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z streamforge-rabbitmq-svc 5672; do
                echo "Waiting for RabbitMq..."
                sleep 3
              done
              echo "RabbitMq is ready"
      containers:
        - name: streamforge-transcoder
          image: sudheer0357/streamforge-transcoder:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: "3Gi"
              cpu: "2"
            requests:
              memory: "1Gi"
              cpu: "500m"
          ports:
            - containerPort: 9090
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: streamforge-postgres-svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamforge-postgres-secrets
                  key: userName
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamforge-postgres-secrets
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamforge-postgres-secrets
                  key: databaseName
            - name: POSTGRES_SSL_MODE
              value: disable
            - name: REDIS_URL
              value: redis://streamforge-redis-svc:6379
            - name: REDIS_PASSWORD
              value: ""
            - name: RABBITMQ_URL
              value: amqp://guest:guest@streamforge-rabbitmq-svc:5672/?heartbeat=120
            - name: RABBITMQ_QUEUE
              value: transcoder.jobs
            - name: RABBITMQ_DEAD_LETTER_QUEUE
              value: transcoder.jobs.dlq
            - name: AZURE_STORAGE_ACCOUNT_NAME
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_STORAGE_ACCOUNT_NAME
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_STORAGE_ACCOUNT_KEY
            - name: AZURE_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_STORAGE_ENDPOINT
            - name: AZURE_BLOB_RAW_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_BLOB_RAW_CONTAINER
            - name: AZURE_BLOB_HLS_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_BLOB_HLS_CONTAINER
            - name: FFMPEG_PATH
              value: "/usr/bin/ffmpeg"
            - name: TEMP_DIR
              value: "/tmp"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -qO- http://localhost:9090/metrics || exit 1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -qO- http://localhost:9090/metrics || exit 1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
