# --------- Persistent Volume ---------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-streamforge-postgres
  labels:
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: persistent-volume
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 3Gi
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Delete
  storageClassName: streamforge
  hostPath:
    path: /streamforge/pg_data
