# --------- Deployment : RabbitMQ ---------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamforge-rabbitmq
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/part-of: streamforge-application
      app.kubernetes.io/component: queue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/component: queue
    spec:
      containers:
        - name: streamforge-rabbitmq
          image: rabbitmq:4.2.4-alpine
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 5672
              protocol: TCP
              name: amqp
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              value: guest
