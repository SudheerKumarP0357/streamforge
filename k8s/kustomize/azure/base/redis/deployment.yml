# --------- Deployment : Redis ---------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamforge-redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: streamforge-application
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: streamforge-redis
          image: redis:alpine
          command: ["redis-server"]
          args: ["/config/redis.conf"]
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-conf
              mountPath: /config
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: pvc-streamforge-redis
        - name: redis-conf
          configMap:
            name: streamforge-redis-config
            items:
              - key: redis-config
                path: redis.conf
