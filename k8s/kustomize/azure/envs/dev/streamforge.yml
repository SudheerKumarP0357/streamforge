---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: transcoder
    app.kubernetes.io/part-of: streamforge-application
  name: streamforge-transcoder-svc
  namespace: streamforge-dev
spec:
  ports:
    - port: 9090
