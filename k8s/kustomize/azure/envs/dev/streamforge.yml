  name: pv-streamforge-postgres
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 3Gi
  hostPath:
    path: /streamforge/pg_data
  persistentVolumeReclaimPolicy: Delete
  storageClassName: streamforge
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolume
metadata:
  labels:
    app.kubernetes.io/component: persistent-volume
    app.kubernetes.io/part-of: streamforge-application
  name: pv-streamforge-redis
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  hostPath:
    path: /streamforge/redis_data
  persistentVolumeReclaimPolicy: Delete
  storageClassName: streamforge
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/component: persistent-volume-claim
    app.kubernetes.io/part-of: streamforge-application
  name: pvc-streamforge-postgres
  namespace: streamforge-dev
spec:
  accessModes:
    - ReadWriteOnce
