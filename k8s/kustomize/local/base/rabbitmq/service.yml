# --------- Service : RabbitMq ---------
apiVersion: v1
kind: Service
metadata:
  name: streamforge-rabbitmq-svc
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: queue
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
  type: ClusterIP
