# --------- Deployment : API ---------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamforge-api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: streamforge-application
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/part-of: streamforge-application
      app.kubernetes.io/component: backend
  replicas: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: streamforge-application
        app.kubernetes.io/component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api
                topologyKey: kubernetes.io/hostname
      initContainers:
        # InitContainer for Postgres
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z streamforge-postgres-svc 5432; do
                echo "Waiting for Postgres..."
                sleep 3
              done
              echo "Port is ready"

        # InitContainer for Redis
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z streamforge-redis-svc 6379; do
                echo "Waiting for Redis..."
                sleep 3
              done
              echo "Redis is ready"

        # InitContainer for RabbitMq
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z streamforge-rabbitmq-svc 5672; do
                echo "Waiting for RabbitMq..."
                sleep 3
              done
              echo "RabbitMq is ready"

      containers:
        - name: streamforge-api
          image: sudheer0357/streamforge-api:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: streamforge-postgres-svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamforge-postgres-secrets
                  key: userName
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamforge-postgres-secrets
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamforge-postgres-secrets
                  key: databaseName
            - name: POSTGRES_SSL_MODE
              value: disable
            - name: REDIS_URL
              value: redis://streamforge-redis-svc:6379
            - name: REDIS_PASSWORD
              value: ""
            - name: RABBITMQ_URL
              value: amqp://guest:guest@streamforge-rabbitmq-svc:5672/?heartbeat=120
            - name: AZURE_STORAGE_ACCOUNT_NAME
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_STORAGE_ACCOUNT_NAME
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_STORAGE_ACCOUNT_KEY
            - name: AZURE_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_STORAGE_ENDPOINT
            - name: AZURE_BLOB_RAW_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_BLOB_RAW_CONTAINER
            - name: AZURE_BLOB_HLS_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: streamforge-azst-secrets
                  key: AZURE_BLOB_HLS_CONTAINER
            - name: COSMOS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: streamforge-mongodb-secret
                  key: COSMOS_CONNECTION_STRING
            - name: COSMOS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: streamforge-mongodb-secret
                  key: COSMOS_DATABASE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: streamforge-common-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRY_HOURS
              valueFrom:
                secretKeyRef:
                  name: streamforge-common-secrets
                  key: JWT_EXPIRY_HOURS
            - name: REFRESH_TOKEN_EXPIRY_DAYS
              valueFrom:
                secretKeyRef:
                  name: streamforge-common-secrets
                  key: REFRESH_TOKEN_EXPIRY_DAYS
            - name: CORS_ALLOWED_ORIGIN
              value: http://streamforge-frontend-svc:3000
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -qO- http://localhost:8080/healthz || exit 1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -qO- http://localhost:8080/healthz || exit 1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
